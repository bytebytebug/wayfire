[autostart]
panel = quickshell

[input]
xkb_layout = br
xkb_variant = abnt2

[core]
plugins = command switcher move resize decoration expo scale wm-actions grid alpha blur autostart vswitch

[decoration]
active_color = 0.2 0.2 0.2 1.0
inactive_color = 0.1 0.1 0.1 1.0
title_height = 24
border_size = 4

[command]
binding_terminal = <super> KEY_ENTER
command_terminal = kitty

binding_launcher = <super> KEY_D
command_launcher = wofi --show drun

binding_browser = <super> KEY_B
command_browser = firefox

binding_filemanager = <super> KEY_E
command_filemanager = nautilus

[scale]
toggle = <super> KEY_TAB

[wm-actions]
toggle_maximize = <super> KEY_M

[vswitch]
with_win_left = <super> <shift> KEY_LEFT
with_win_right = <super> <shift> KEY_RIGHT
with_win_up = <super> <shift> KEY_UP
with_win_down = <super> <shift> KEY_DOWN

binding_left = <super> <ctrl> KEY_LEFT
binding_right = <super> <ctrl> KEY_RIGHT
binding_up = <super> <ctrl> KEY_UP
binding_down = <super> <ctrl> KEY_DOWN

